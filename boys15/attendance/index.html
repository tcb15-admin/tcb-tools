<!DOCTYPE html>
<html lang="ja" data-cohort="15">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>東海中央ボーイズ 15期 出欠管理</title>
<meta name="theme-color" content="#122050">
<link rel="icon" type="image/png" sizes="32x32" href="../favicon-32.png">
<link rel="apple-touch-icon" href="../apple-touch-icon.png">
<link rel="stylesheet" href="attendance.css">
</head>
<body class="att-body">
<header class="att-hdr">
  <h1>出欠管理<span>東海中央ボーイズ 15期 · MG／親父 LINE 踏襲</span></h1>
  <a class="att-hdr-link" href="../portal/">ポータル</a>
</header>

<div id="att-pw" class="att-pw">
  <div class="att-pw-card">
    <h2>出欠管理ログイン</h2>
    <input id="att-pw-inp" type="password" placeholder="パスワード" autocomplete="current-password">
    <button type="button" id="att-pw-btn" class="att-btn att-btn-primary" style="width:100%">入る</button>
    <p id="att-pw-err" class="att-status err"></p>
  </div>
</div>

<main class="att-wrap">
  <section class="att-card">
    <h2>出欠キャンペーンを作成</h2>
    <p class="att-act-meta" style="margin-bottom:10px">複数日をまとめて作成します（例: 土・日・月）。MG用と親父用で別URLを発行します。</p>
    <form id="att-create-form">
      <div class="att-field"><label for="att-title">タイトル</label><input id="att-title" maxlength="120" placeholder="例: 7月18日、19日、20日出欠確認" required></div>
      <div class="att-field" style="margin-top:8px"><label for="att-memo">案内メモ</label><textarea id="att-memo" maxlength="500" placeholder="集合場所など（任意）"></textarea></div>
      <div id="att-day-rows" style="margin-top:10px"></div>
      <div class="att-row" style="margin-top:8px">
        <button type="button" id="att-add-day" class="att-btn att-btn-ghost">日付を追加</button>
        <button type="submit" class="att-btn att-btn-primary">作成</button>
        <button type="button" id="att-btn-refresh" class="att-btn att-btn-ghost">再読込</button>
      </div>
    </form>
  </section>

  <section class="att-card">
    <h2>キャンペーン一覧</h2>
    <div id="att-list"></div>
  </section>

  <p id="att-detail-empty" class="att-act-meta">一覧から選ぶと、MG／親父のURL・投稿文・回答状況を表示します。</p>

  <section id="att-detail" class="att-hidden">
    <div class="att-card">
      <h2 id="att-d-title">詳細</h2>
      <p id="att-d-meta" class="att-act-meta"></p>
      <div id="att-d-counts" class="att-counts"></div>
      <div class="att-row" style="margin-top:10px">
        <button type="button" id="att-btn-publish" class="att-btn att-btn-primary">MG／親父URLを発行</button>
        <button type="button" id="att-btn-copy-mg-inv" class="att-btn att-btn-line">MG案内をコピー</button>
        <button type="button" id="att-btn-copy-fa-inv" class="att-btn att-btn-ghost">親父案内をコピー</button>
      </div>
      <p class="att-act-meta" style="margin-top:10px">MG（母）回答URL</p>
      <div id="att-url-mg" class="att-preview"></div>
      <p class="att-act-meta" style="margin-top:10px">親父回答URL</p>
      <div id="att-url-fa" class="att-preview"></div>
    </div>
    <div class="att-card">
      <h2>回答状況</h2>
      <div id="att-roster" class="att-roster"></div>
    </div>
  </section>

  <p id="att-status" class="att-status"></p>
</main>

<script>
window.TCB_ATT_CFG={
  cohort:"15",
  apiBase:"https://tcb-tools-sync.kazoo-matsu.workers.dev",
  apiToken:"__SYNC_API_TOKEN__",
  initialPw:"tcb15",
  lsPrefix:"tcb15",
  pagesBase:"https://tcb15-admin.github.io/tcb-tools/boys15",
  teamName:"東海中央ボーイズ 15期"
};
</script>
<script src="../tcb-sync-api.js"></script>
<script src="attendance-line.js"></script>
<script src="attendance-staff.js"></script>
</body>
</html>
