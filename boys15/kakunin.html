<style>
:root{
  --navy:#122050;--navy2:#1a2d68;--blue:#122050;
  --acc:#c0000a;--grn:#2e7d32;--grn-l:#e7f5ea;
  --red:#c0000a;--red-l:#fdecec;--bg:#f5f5f7;--card:#ffffff;
  --bdr:#e5e5ea;--txt:#1c1c22;--txt2:#6e6e78;
  --ta:#122050;--ta-bg:#eef1f8;--ta-bd:#aab6d4;
  --tb:#c0000a;--tb-bg:#fdecec;--tb-bd:#e6a3a3;
  --hdr-g1:#122050;--hdr-g2:#1a2d68;--hdr-sh:rgba(18,32,80,.28);--h1-sub:#9fb4e8;
  --ink-info:#1e3a6a;--tap:46px;
  --surface-2:#f2f2f5;--r-card:18px;--r-ctl:12px;--r-pill:980px;
  --sh-card:0 1px 2px rgba(18,32,80,.04),0 10px 30px rgba(18,32,80,.06);
}
html{color-scheme:light;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Hiragino Sans","Noto Sans JP",system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:15px;-webkit-font-smoothing:antialiased;letter-spacing:.1px;}
header{background:linear-gradient(135deg,var(--hdr-g1),var(--hdr-g2));padding:12px 16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px var(--hdr-sh);display:flex;align-items:center;gap:10px;}
html[data-cohort="15"] header{border-bottom:3px solid #c0000a;box-shadow:0 2px 14px rgba(18,32,80,.2);}
.logo{width:52px;height:52px;background:transparent;border-radius:10px;object-fit:cover;flex-shrink:0;}
h1{font-weight:900;font-size:15px;color:#fff;line-height:1.3;flex:1;min-width:0;}
h1 span{font-size:10px;font-weight:400;color:var(--h1-sub);display:block;margin-top:2px;line-height:1.35;}
.tcb-cohort-chip{flex-shrink:0;font-size:11px;font-weight:900;letter-spacing:.06em;padding:7px 11px;border-radius:999px;line-height:1;box-shadow:0 1px 3px rgba(0,0,0,.12);}
html[data-cohort="15"] .tcb-cohort-chip,html[data-cohort="16"] .tcb-cohort-chip{background:linear-gradient(165deg,#fde68a,#f59e0b);color:#78350f;border:1px solid rgba(180,83,9,.45);}
.pv-wrap{max-width:680px;margin:0 auto;padding:16px 14px 48px;}
.pv-note{background:var(--surface-2);border-left:none;border-radius:12px;padding:12px 14px;font-size:12.5px;color:var(--txt2);margin-bottom:16px;line-height:1.65;}
.pv-note strong{font-weight:700;color:var(--txt);}
.pv-card{background:var(--card);border-radius:var(--r-card);box-shadow:var(--sh-card);padding:18px;margin-bottom:16px;border:1px solid transparent;}
.pv-card-today{background:linear-gradient(180deg,#eef1f8 0%,var(--card) 42%);border:2px solid var(--ta-bd);box-shadow:0 0 0 1px rgba(18,32,80,.05),0 10px 28px rgba(18,32,80,.10);}
.pv-card-prev{background:var(--surface-2);border:1px solid var(--bdr);box-shadow:none;}
.pv-day-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--bdr);}
.pv-card-today .pv-day-head{border-bottom:2px solid var(--ta-bd);padding-bottom:12px;margin-bottom:14px;}
.pv-card-prev .pv-day-head{border-bottom-style:dashed;opacity:.9;}
.pv-day-label{font-weight:750;font-size:17px;letter-spacing:-.3px;color:var(--navy);}
.pv-card-prev .pv-day-label{font-size:15px;font-weight:650;color:var(--txt2);}
.pv-day-date{font-size:12.5px;color:var(--txt2);}
.pv-day-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:var(--r-pill);background:var(--grn);color:#fff;letter-spacing:.3px;}
.pv-day-badge-today{font-size:12px;padding:5px 13px;background:var(--navy);letter-spacing:.05em;box-shadow:0 1px 4px rgba(18,32,80,.22);}
.pv-day-badge.prev{background:#8e8e97;font-size:10px;padding:3px 9px;}
.pv-person{border:1px solid var(--bdr);border-radius:14px;padding:12px 14px;margin-bottom:10px;}
.pv-person-name{font-weight:650;font-size:14.5px;color:var(--navy);display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.pv-team-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;}
.pv-team-tag.A{background:var(--ta-bg);color:var(--ta);border:1px solid var(--ta-bd);}
.pv-team-tag.B{background:var(--tb-bg);color:var(--tb);border:1px solid var(--tb-bd);}
.pv-tools{list-style:none;display:flex;flex-wrap:wrap;gap:6px;}
.pv-tool{font-size:12.5px;background:var(--surface-2);border:none;border-radius:10px;padding:6px 11px;color:var(--txt);}
.pv-tool .pv-tool-desc{color:var(--txt2);font-size:11px;margin-left:4px;}
.pv-empty{font-size:13px;color:var(--txt2);padding:6px 2px;}
.pv-updated{font-size:11px;color:var(--txt2);text-align:right;margin-top:2px;}
.pv-state{background:var(--card);border-radius:var(--r-card);box-shadow:var(--sh-card);padding:24px 16px;text-align:center;color:var(--txt2);font-size:14px;line-height:1.7;}
.pv-state .pv-state-emoji{font-size:30px;display:block;margin-bottom:8px;}
.pv-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.pv-btn{flex:1;min-width:120px;padding:12px;background:var(--navy);color:#fff;border:none;border-radius:14px;font-size:14px;font-weight:600;letter-spacing:-.1px;cursor:pointer;min-height:var(--tap);font-family:inherit;}
.pv-btn:disabled{opacity:.6;cursor:default;}
.pv-foot{text-align:center;font-size:10px;color:var(--txt2);margin-top:18px;}
@media (max-width:520px){
  header{padding:10px 12px;padding-top:max(10px, env(safe-area-inset-top, 0px));gap:8px;}
  header .logo{width:48px;height:48px;}
  header h1{font-size:14px;min-width:0;}
  header h1 span{font-size:9px;line-height:1.35;}
  .tcb-cohort-chip{font-size:10px;padding:6px 10px;}
}
/* 16期テーマ：ヘッダ白ベース＋紺×赤 */
html.theme-b16 header{background:#fff;border-bottom:3px solid #c0000a;box-shadow:0 2px 14px rgba(18,32,80,.12);}
html.theme-b16 header h1{color:#122050;}
html.theme-b16 header h1 span{color:#64748b;}
/* ダークモード（システム設定に自動追従） */
@media (prefers-color-scheme:dark){
  :root{
    --bg:#000000;--card:#1c1c1e;--surface-2:#2c2c2e;--bdr:#38383a;
    --txt:#f5f5f7;--txt2:#a1a1ac;--grn:#30d158;
    --ta:#9fb4e8;--ta-bg:#22242b;--ta-bd:#3a4a6a;
    --tb:#ff9ea2;--tb-bg:#3a1e1e;--tb-bd:#7a3a3a;
    --sh-card:0 0 0 1px rgba(255,255,255,.06);
  }
  html{color-scheme:dark;}
  .pv-card,.pv-state{border:1px solid var(--bdr);}
  .pv-card-today{background:linear-gradient(180deg,#22242b 0%,#1c1c1e 45%);border:2px solid #5b6cff;box-shadow:0 0 0 1px rgba(91,108,255,.12),0 6px 20px rgba(0,0,0,.35);}
  .pv-card-today .pv-day-head{border-bottom-color:#5b6cff;}
  .pv-day-badge-today{background:#3a4a8a;box-shadow:0 1px 4px rgba(0,0,0,.35);}
  .pv-card-prev{background:#2c2c2e;border-color:#38383a;}
  .pv-card-prev .pv-day-label{color:#a1a1ac;}
  .pv-day-label,.pv-person-name{color:#f5f5f7;}
  .pv-note{background:var(--surface-2);}
  html.theme-b16 header{background:#1c1c1e;border-bottom-color:#e5484d;}
  html.theme-b16 header h1{color:#f5f5f7;}
  html.theme-b16 header h1 span{color:#a1a1ac;}
}
</style>
</head>
